<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel</title>
  <link rel="icon" href="data:," />
  <script>
    (function () {
      var h = new Date().getHours();
      document.documentElement.dataset.theme = (h >= 18 || h < 5) ? 'dark' : 'light';
    })();
  </script>
  <link rel="stylesheet" href="style.css?v=16" />
</head>
<body>
  <header class="topbar" aria-label="Status bar">
    <div id="greeting" class="greeting-bar" aria-label="Time-based greeting"></div>
    <div id="system-status" class="system-status device-status--unknown" aria-label="System status"></div>
    <div id="connectivity" class="connectivity net--unknown" aria-label="Network status"></div>
  </header>
  <main class="dashboard" aria-label="Personal dashboard">
    <section id="clock" class="widget" aria-label="Clock"></section>
    <section id="weather" class="widget" aria-label="Weather"></section>
    <section id="calendar" class="widget" aria-label="Calendar"></section>
    <section id="tasks" class="widget" aria-label="Tasks"></section>
  </main>

  <div id="offline-screen" class="offline-screen" hidden>
    <div class="offline-card">
      <svg class="offline-glyph" viewBox="0 0 24 24" aria-hidden="true" fill="none"
           stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2.5 8.5a15 15 0 0 1 19 0" />
        <path d="M5.5 12a10.5 10.5 0 0 1 13 0" />
        <path d="M8.5 15.5a6 6 0 0 1 7 0" />
        <circle cx="12" cy="19" r="1.1" fill="currentColor" stroke="none" />
        <line x1="3.5" y1="20.5" x2="20.5" y2="3.5" />
      </svg>
      <div class="offline-title">No network connection</div>
      <div class="offline-sub">Panel will reconnect automatically.</div>
    </div>
  </div>

  <script src="widgets/theme.js?v=1"></script>
  <script src="widgets/greeting.js?v=8"></script>
  <script src="widgets/clock.js?v=5"></script>
  <script src="widgets/weather.js?v=5"></script>
  <script src="widgets/calendar.js?v=3"></script>
  <script src="widgets/tasks.js?v=2"></script>
  <script src="widgets/device-status.js?v=4"></script>
  <script src="widgets/connectivity.js?v=1"></script>
  <script src="app.js?v=9"></script>
</body>
</html>
