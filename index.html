<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel</title>
  <link rel="icon" href="data:," />
  <script>
    (function () {
      var h = new Date().getHours();
      document.documentElement.dataset.theme = (h >= 18 || h < 5) ? 'dark' : 'light';
    })();
  </script>
  <link rel="stylesheet" href="style.css?v=22" />
</head>
<body>
  <header class="topbar" aria-label="Status bar">
    <div id="greeting" class="greeting-bar" aria-label="Time-based greeting"></div>
    <div id="connectivity" class="connectivity net--unknown" aria-label="Network status"></div>
  </header>
  <main class="dashboard" aria-label="Personal dashboard">
    <section id="clock" class="widget" aria-label="Clock"></section>
    <section id="weather" class="widget" aria-label="Weather"></section>
    <section id="calendar" class="widget" aria-label="Calendar"></section>
    <section id="tasks" class="widget" aria-label="Tasks"></section>
  </main>

  <footer class="status-dock" aria-label="System history">
    <div class="status-summary">
      <span class="status-summary-title">System</span>
      <span id="system-uptime" class="system-uptime">Uptime —</span>
      <span class="status-summary-detail">11 P95 · Live 30m avg</span>
    </div>
    <div id="system-status" class="status-grid" aria-label="System status"></div>
  </footer>

  <div id="offline-screen" class="offline-screen" hidden>
    <div id="offline-status" class="system-status device-status--unknown"></div>
    <div class="offline-clock" id="offline-clock">--:--:--</div>
    <div class="offline-tag">Offline</div>
  </div>

  <div class="version-tag">0.5.0 Beta-B</div>

  <script src="widgets/util.js?v=1"></script>
  <script src="widgets/theme.js?v=1"></script>
  <script src="widgets/greeting.js?v=8"></script>
  <script src="widgets/clock.js?v=5"></script>
  <script src="widgets/weather.js?v=6"></script>
  <script src="widgets/calendar.js?v=4"></script>
  <script src="widgets/tasks.js?v=3"></script>
  <script src="widgets/status-grid.js?v=3"></script>
  <script src="widgets/connectivity.js?v=2"></script>
  <script src="app.js?v=10"></script>
</body>
</html>
