<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; style-src-attr 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'" />
  <title>Panel</title>
  <link rel="icon" href="data:," />
  <script src="widgets/boot-theme.js?v=1"></script>
  <link rel="stylesheet" href="style.css?v=26" />
</head>
<body>
  <header class="topbar" aria-label="Status bar">
    <div id="greeting" class="greeting-bar" aria-label="Time-based greeting"></div>
    <div class="topbar-actions">
      <div class="update-anchor">
        <button id="update-button" class="update-button" type="button" aria-label="Open available update" aria-expanded="false" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v12"></path>
            <path d="m7 10 5 5 5-5"></path>
            <path d="M5 21h14"></path>
          </svg>
        </button>
        <aside id="update-popover" class="update-popover" role="dialog" aria-labelledby="update-title" hidden>
          <div class="update-popover-heading">
            <div>
              <div id="update-eyebrow" class="update-eyebrow">PANEL UPDATE</div>
              <h2 id="update-title">Update available</h2>
            </div>
            <button id="update-close" class="update-close" type="button" aria-label="Close update details">
              <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <path d="m7 7 10 10M17 7 7 17"></path>
              </svg>
            </button>
          </div>
          <div class="update-version-route">
            <div>
              <span>Installed</span>
              <strong id="update-current-version">1.0.0</strong>
            </div>
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14"></path>
              <path d="m14 7 5 5-5 5"></path>
            </svg>
            <div>
              <span>Available</span>
              <strong id="update-available-version">—</strong>
            </div>
          </div>
          <div id="update-status" class="update-status">A verified update is available.</div>
          <progress id="update-progress" class="update-progress" max="100" value="0" hidden></progress>
          <div class="update-release">
            <div id="update-release-label" class="update-release-label">WHAT'S NEW</div>
            <ul id="update-release-notes"></ul>
          </div>
          <button id="update-primary" class="update-primary" type="button">Download update</button>
          <div class="update-security">Signed update · Automatic rollback protection</div>
        </aside>
      </div>
      <div id="connectivity" class="connectivity net--unknown" aria-label="Network status"></div>
      <button id="settings-button" class="settings-button" type="button" aria-label="Open settings">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06-2.83 2.83-.06-.06a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56V21h-4v-.08A1.7 1.7 0 0 0 8.97 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06-2.83-2.83.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.52-1H3v-4h.08A1.7 1.7 0 0 0 4.6 8.97a1.7 1.7 0 0 0-.34-1.88l-.06-.06L7.03 4.2l.06.06A1.7 1.7 0 0 0 8.97 4.6 1.7 1.7 0 0 0 10 3.08V3h4v.08a1.7 1.7 0 0 0 1.03 1.52 1.7 1.7 0 0 0 1.88-.34l.06-.06 2.83 2.83-.06.06a1.7 1.7 0 0 0-.34 1.88A1.7 1.7 0 0 0 20.92 10H21v4h-.08A1.7 1.7 0 0 0 19.4 15Z"></path>
        </svg>
      </button>
    </div>
  </header>
  <main class="dashboard" aria-label="Personal dashboard">
    <section id="clock" class="widget" aria-label="Clock"></section>
    <section id="weather" class="widget" aria-label="Weather"></section>
    <section id="calendar" class="widget" aria-label="Calendar"></section>
    <section id="tasks" class="widget" aria-label="Tasks"></section>
  </main>

  <footer class="status-dock" aria-label="System history">
    <div class="status-summary">
      <span class="status-summary-title">System</span>
      <span id="system-uptime" class="system-uptime">Uptime —</span>
      <span class="status-summary-detail">11 P95 · Live 30m avg</span>
    </div>
    <div id="system-status" class="status-grid" aria-label="System status"></div>
  </footer>

  <div id="offline-screen" class="offline-screen" hidden>
    <div id="offline-status" class="system-status device-status--unknown"></div>
    <div class="offline-clock" id="offline-clock">--:--:--</div>
    <div class="offline-tag">Offline</div>
  </div>

  <button id="app-version" class="version-tag" type="button" aria-label="Panel version 1.0.0. Click three times for build details">1.0.0</button>

  <dialog id="version-dialog" class="version-dialog" aria-labelledby="version-dialog-title">
    <section class="version-dialog-card">
      <header class="version-dialog-header">
        <h2 id="version-dialog-title">Build information</h2>
        <button id="version-dialog-close" class="version-dialog-close" type="button" aria-label="Close build information">×</button>
      </header>
      <pre id="version-json" class="version-json"></pre>
    </section>
  </dialog>

  <script src="widgets/util.js?v=1"></script>
  <script src="widgets/theme.js?v=1"></script>
  <script src="widgets/greeting.js?v=8"></script>
  <script src="widgets/clock.js?v=5"></script>
  <script src="widgets/weather.js?v=7"></script>
  <script src="widgets/calendar.js?v=5"></script>
  <script src="widgets/tasks.js?v=4"></script>
  <script src="widgets/status-tiers.js?v=1"></script>
  <script src="widgets/refresh-policy.js?v=1"></script>
  <script src="widgets/status-grid.js?v=5"></script>
  <script src="widgets/connectivity.js?v=4"></script>
  <script src="widgets/update.js?v=1"></script>
  <script src="widgets/settings.js?v=1"></script>
  <script src="widgets/version.js?v=1"></script>
  <script src="app.js?v=15"></script>
</body>
</html>
