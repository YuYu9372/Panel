<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
  <title>Panel Settings</title>
  <link rel="stylesheet" href="settings.css">
  <script src="settings.js" defer></script>
</head>
<body>
  <header class="settings-topbar">
    <div>
      <div class="settings-kicker">PANEL</div>
      <h1>Settings</h1>
    </div>
    <button id="back-button" class="icon-button" type="button" aria-label="Return to dashboard">
      <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5"></path>
        <path d="m11 18-6-6 6-6"></path>
      </svg>
    </button>
  </header>

  <main class="settings-layout">
    <nav class="settings-nav" aria-label="Settings sections">
      <button class="settings-tab is-active" type="button" aria-current="page">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 12h8"></path>
          <path d="M12 8v8"></path>
          <circle cx="12" cy="12" r="9"></circle>
        </svg>
        <span>Connections</span>
      </button>
    </nav>

    <section class="settings-card" aria-labelledby="connections-title">
      <div class="card-heading">
        <div>
          <div class="settings-kicker">CONNECTIONS</div>
          <h2 id="connections-title">Services and refresh</h2>
        </div>
        <div class="security-badge">Encrypted locally</div>
      </div>

      <form id="connections-form" novalidate>
        <div class="field-group refresh-group">
          <label for="refresh-minutes">Refresh time</label>
          <div class="number-control">
            <input id="refresh-minutes" name="refreshMinutes" type="number" min="1" max="1440" step="1" inputmode="numeric" required>
            <span>min</span>
          </div>
          <p>Controls automatic Calendar and Tasks refreshes.</p>
        </div>

        <div class="service-section">
          <div class="service-heading">
            <div>
              <span class="service-dot anthropic-dot"></span>
              <h3>Anthropic</h3>
            </div>
            <span id="anthropic-status" class="connection-status">Not tested</span>
          </div>
          <div class="field-group">
            <label for="anthropic-api-key">API key</label>
            <div class="secret-control">
              <input id="anthropic-api-key" name="anthropicApiKey" type="password" autocomplete="off" spellcheck="false">
              <button class="reveal-button" type="button" data-target="anthropic-api-key">Show</button>
            </div>
          </div>
        </div>

        <div class="service-section">
          <div class="service-heading">
            <div>
              <span class="service-dot composio-dot"></span>
              <h3>Composio MCP</h3>
            </div>
            <span id="composio-status" class="connection-status">Not tested</span>
          </div>
          <div class="field-group">
            <label for="composio-mcp-token">MCP token</label>
            <div class="secret-control">
              <input id="composio-mcp-token" name="composioMcpToken" type="password" autocomplete="off" spellcheck="false">
              <button class="reveal-button" type="button" data-target="composio-mcp-token">Show</button>
            </div>
          </div>
        </div>

        <div id="form-message" class="form-message" role="status" aria-live="polite"></div>

        <div class="form-actions">
          <button id="test-button" class="secondary-button" type="button">Test connections</button>
          <button id="save-button" class="primary-button" type="submit">Save changes</button>
        </div>
      </form>
    </section>
  </main>

  <div class="version-tag">0.5.2_A</div>
</body>
</html>
